name: Crowdin Action

on:
  push:
    branches: [ main ] # 当 main 分支有变动时触发同步

jobs:
  synchronize-with-crowdin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: crowdin action
        uses: crowdin/github-action@v2
        with:
          # 上传最新的 en_us.json 源文件
          upload_sources: true
          upload_translations: false
          
          # 下载翻译好的文件并创建 Pull Request
          download_translations: true
          create_pull_request: true
          
          # PR 设置
          localization_branch_name: l10n_crowdin_translations
          pull_request_title: ' chore: [Crowdin] 自动同步翻译文件'
          pull_request_body: '由 Crowdin GitHub Action 自动生成的翻译更新。'
          pull_request_base_branch_name: 'main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 使用 GitHub 默认提供的
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
